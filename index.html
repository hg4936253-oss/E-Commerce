<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopZone – Login</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <!-- Animated background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="login-wrapper">
    <div class="login-left">
      <div class="brand-mark">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">ShopZone</span>
      </div>
      <h1 class="login-headline">Your style,<br/><em>your world.</em></h1>
      <p class="login-sub">Thousands of products. One seamless experience.</p>
      <div class="login-stats">
        <div class="stat"><strong>50K+</strong><span>Products</span></div>
        <div class="stat"><strong>2M+</strong><span>Customers</span></div>
        <div class="stat"><strong>4.9★</strong><span>Rating</span></div>
      </div>
    </div>

    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="card-sub">Sign in to continue shopping</p>

      <div id="login-error" class="form-error" style="display:none;">❌ Invalid email or password</div>
      <div id="login-success" class="form-success" style="display:none;">✅ Login Successful! Redirecting...</div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password"/>
        <span class="toggle-pass" onclick="togglePass()">👁</span>
      </div>
      <div class="form-row">
        <label class="checkbox-label"><input type="checkbox" id="remember"/> Remember me</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button class="btn-primary full-width" onclick="handleLogin()">Sign In</button>
      <div class="divider"><span>or</span></div>
      <button class="btn-social" onclick="guestLogin()">🛍️ Continue as Guest</button>
      <p class="signup-link">New here? <a href="#" onclick="showSignup()">Create account</a></p>
    </div>
  </div>

  <!-- Signup Modal -->
  <div id="signup-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" onclick="closeSignup()">✕</button>
      <h2>Create Account</h2>
      <div class="form-group"><label>Full Name</label><input type="text" id="su-name" placeholder="Your Name"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="su-pass" placeholder="Min 6 characters"/></div>
      <button class="btn-primary full-width" onclick="handleSignup()">Create Account</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
